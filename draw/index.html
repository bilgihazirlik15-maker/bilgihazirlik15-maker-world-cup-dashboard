<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>World Cup 2026 Dashboard</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b1020;
  color:white;
}

.container {
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.header {
  display:flex;
  align-items:center;
  gap:15px;
  margin-bottom:20px;
}

.logo {
  width:70px;
  height:70px;
  border-radius:50%;
  border:2px solid #31476f;
  cursor:pointer;
}

.card {
  background:#121933;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.item {
  background:#1b2345;
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
}

table {
  width:100%;
  font-size:12px;
}

td {
  padding:4px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <img src="logo.png" id="logoTrigger" class="logo">
  <h2>World Cup Dashboard</h2>
</div>

<div class="card">
  <h3>Today's Matches</h3>
  <input type="date" id="datePicker">
  <div id="todayMatches"></div>
</div>

<div class="grid">

<div class="card">
  <h3>Groups</h3>
  <div id="groups"></div>
</div>

<div>

<div class="card">
  <h3>Next Matches</h3>
  <div id="next"></div>
</div>

<div class="card">
  <h3>Results</h3>
  <div id="results"></div>
</div>

</div>

</div>

</div>

<script>

let matches=[], standings=[], selectedDate="";

/* CSV LOAD */
async function loadCSV(path){
  let res = await fetch(path);
  let text = await res.text();
  let rows = text.trim().split("\n");
  let headers = rows[0].split(",");

  return rows.slice(1).map(r=>{
    let cols=r.split(",");
    let obj={};
    headers.forEach((h,i)=>obj[h]=cols[i]);
    return obj;
  });
}

/* DATE FIX */
function normDate(v){
  if(!v) return "";
  if(v.includes(".")){
    let p=v.split(" ")[0].split(".");
    return p[2]+"-"+p[1].padStart(2,"0")+"-"+p[0].padStart(2,"0");
  }
  return v.slice(0,10);
}

/* TODAY */
function renderToday(){
  let list = matches.filter(m=>normDate(m.match_date)==selectedDate);

  document.getElementById("todayMatches").innerHTML =
    list.map(m=>`
      <div class="item">
        ${m.home_team} vs ${m.away_team}
      </div>
    `).join("") || "No matches";
}

/* GROUPS */
function renderGroups(){
  let g=[...new Set(standings.map(x=>x.group_name))];

  document.getElementById("groups").innerHTML =
    g.map(name=>{
      let rows=standings.filter(x=>x.group_name==name);
      return `
      <div>
      <b>Group ${name}</b>
      <table>
      ${rows.map(r=>`
      <tr>
      <td>${r.team_name}</td>
      <td>${r.points}</td>
      </tr>`).join("")}
      </table>
      </div>`;
    }).join("");
}

/* INIT */
async function init(){

  matches = await loadCSV("./data/matches.csv");
  standings = await loadCSV("./data/standings.csv");

  selectedDate = normDate(matches[0].match_date);
  document.getElementById("datePicker").value = selectedDate;

  document.getElementById("datePicker").addEventListener("change", e=>{
    selectedDate = e.target.value;
    renderToday();
  });

  renderToday();
  renderGroups();
}

init();

/* 🔥 HIDDEN ADMIN */
let clicks=0;
let timer;

document.getElementById("logoTrigger").addEventListener("click",()=>{
  clicks++;

  if(clicks===5){
    window.location.href="manage_matches.html";
  }

  clearTimeout(timer);
  timer=setTimeout(()=>clicks=0,1500);
});

</script>

</body>
</html>
