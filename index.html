<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup 2026 Dashboard</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }

    .page {
      max-width: 1700px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 34px;
      color: #ffffff;
    }

    .subtitle {
      margin: 0 0 24px 0;
      color: #94a3b8;
      font-size: 15px;
    }

    .status {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 20px;
      color: #cbd5e1;
    }

    .error {
      background: #3f1d1d;
      border-color: #7f1d1d;
      color: #fecaca;
    }

    .top-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }

    .middle-grid {
      display: grid;
      grid-template-columns: 1.3fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
      align-items: start;
    }

    .card {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.22);
    }

    .card h2 {
      margin: 0 0 14px 0;
      font-size: 18px;
      color: #ffffff;
    }

    .stat-label {
      color: #94a3b8;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 30px;
      font-weight: bold;
      color: #ffffff;
    }

    .scroll-box {
      max-height: 420px;
      overflow-y: auto;
      padding-right: 6px;
    }

    .match-item,
    .leader-item {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .match-item:last-child,
    .leader-item:last-child {
      margin-bottom: 0;
    }

    .match-meta {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .match-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      background: #111827;
      border-radius: 8px;
      margin-bottom: 6px;
    }

    .match-line:last-child {
      margin-bottom: 0;
    }

    .team-name {
      flex: 1;
      font-weight: 600;
      font-size: 14px;
      color: #f8fafc;
    }

    .score {
      min-width: 28px;
      text-align: center;
      font-weight: bold;
      color: #ffffff;
    }

    .groups-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .group-card {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.22);
    }

    .group-title {
      font-size: 17px;
      color: #ffffff;
      font-weight: bold;
      margin-bottom: 10px;
      text-align: center;
    }

    .group-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .group-table th,
    .group-table td {
      padding: 7px 6px;
      border-bottom: 1px solid #273449;
      text-align: left;
    }

    .group-table th {
      color: #93c5fd;
      font-size: 12px;
    }

    .group-table td {
      color: #e5e7eb;
    }

    .leaders-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .leader-title {
      font-weight: bold;
      color: #ffffff;
      margin-bottom: 4px;
    }

    .leader-meta {
      font-size: 13px;
      color: #94a3b8;
      line-height: 1.5;
    }

    .section-title {
      margin: 0 0 14px 0;
      font-size: 24px;
      color: #ffffff;
    }

    .bracket-wrapper {
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .bracket {
      display: flex;
      gap: 24px;
      min-width: max-content;
      align-items: flex-start;
    }

    .round-column {
      min-width: 260px;
      flex: 0 0 260px;
    }

    .round-title {
      background: #1e293b;
      color: #ffffff;
      padding: 12px 14px;
      border-radius: 12px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 14px;
      border: 1px solid #334155;
    }

    .match-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .match-card {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    }

    .team-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #1f2937;
      margin-bottom: 8px;
    }

    .team-row:last-child {
      margin-bottom: 0;
    }

    .winner {
      border: 1px solid #16a34a;
      background: #052e16;
    }

    .pending {
      opacity: 0.8;
    }

    .empty-note {
      color: #94a3b8;
      font-size: 14px;
      padding: 10px 0;
    }

    @media (max-width: 1300px) {
      .groups-grid {
        grid-template-columns: repeat(3, 1fr);
      }

      .top-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .middle-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 900px) {
      .groups-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 16px;
      }

      h1 {
        font-size: 26px;
      }

      .groups-grid,
      .top-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>World Cup 2026 Dashboard</h1>
    <p class="subtitle">CSV-based dashboard with real knockout matches from matches.csv</p>

    <div id="status" class="status">Loading CSV files...</div>

    <div class="top-grid">
      <div class="card">
        <div class="stat-label">Total Teams</div>
        <div id="statTeams" class="stat-value">-</div>
      </div>
      <div class="card">
        <div class="stat-label">Total Matches</div>
        <div id="statMatches" class="stat-value">-</div>
      </div>
      <div class="card">
        <div class="stat-label">Played Matches</div>
        <div id="statPlayed" class="stat-value">-</div>
      </div>
      <div class="card">
        <div class="stat-label">Knockout Matches</div>
        <div id="statKnockout" class="stat-value">-</div>
      </div>
    </div>

    <div class="middle-grid">
      <div class="card">
        <h2>Next Matches</h2>
        <div id="nextMatches" class="scroll-box"></div>
      </div>

      <div class="card">
        <h2>Recent Results</h2>
        <div id="recentResults" class="scroll-box"></div>
      </div>

      <div class="card">
        <h2>Group Leaders</h2>
        <div id="groupLeaders" class="scroll-box"></div>
      </div>
    </div>

    <h2 class="section-title">Groups</h2>
    <div id="groupsGrid" class="groups-grid"></div>

    <h2 class="section-title">Knockout Bracket</h2>
    <div class="bracket-wrapper">
      <div id="bracket" class="bracket"></div>
    </div>
  </div>

  <script>
    const ROUND_ORDER = [
      "Round of 32",
      "Round of 16",
      "Quarter-final",
      "Quarter-finals",
      "Semi-final",
      "Semi-finals",
      "Third place",
      "Final"
    ];

    function setStatus(message, isError = false) {
      const box = document.getElementById("status");
      box.textContent = message;
      box.className = isError ? "status error" : "status";
    }

    async function loadCSV(path) {
      const response = await fetch(path);
      if (!response.ok) {
        throw new Error("Could not load " + path);
      }
      const text = await response.text();
      return parseCSV(text);
    }

    function parseCSV(text) {
      const lines = text.trim().split(/\r?\n/);
      if (lines.length < 2) return [];

      const headers = splitCSVLine(lines[0]).map(h => h.trim());

      const rows = [];
      for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;

        const values = splitCSVLine(lines[i]);
        const row = {};

        headers.forEach((header, index) => {
          row[header] = (values[index] || "").trim();
        });

        rows.push(row);
      }

      return rows;
    }

    function splitCSVLine(line) {
      const result = [];
      let current = "";
      let insideQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const next = line[i + 1];

        if (char === '"' && insideQuotes && next === '"') {
          current += '"';
          i++;
        } else if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === ',' && !insideQuotes) {
          result.push(current);
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current);
      return result;
    }

    function toNumber(value) {
      if (value === null || value === undefined || value === "") return null;
      const n = Number(value);
      return Number.isNaN(n) ? null : n;
    }

    function parseDate(dateStr) {
      if (!dateStr) return null;
      const d = new Date(dateStr);
      return Number.isNaN(d.getTime()) ? null : d;
    }

    function isPlayedMatch(match) {
      const home = toNumber(match.home_score);
      const away = toNumber(match.away_score);
      return home !== null && away !== null;
    }

    function getWinner(match) {
      const homeScore = toNumber(match.home_score);
      const awayScore = toNumber(match.away_score);

      if (homeScore === null || awayScore === null) return null;
      if (homeScore > awayScore) return "home";
      if (awayScore > homeScore) return "away";
      return "draw";
    }

    function getKnockoutMatches(matches) {
      return matches.filter(match => {
        const stage = (match.stage || "").trim().toLowerCase();
        return stage !== "" && stage !== "group";
      });
    }

    function groupMatchesByRound(matches) {
      const grouped = {};
      ROUND_ORDER.forEach(round => grouped[round] = []);

      matches.forEach(match => {
        const stage = (match.stage || "").trim();
        if (!grouped[stage]) grouped[stage] = [];
        grouped[stage].push(match);
      });

      return grouped;
    }

    function getOrderedRounds(groupedMatches) {
      const ordered = [];

      ROUND_ORDER.forEach(round => {
        if (groupedMatches[round] && groupedMatches[round].length > 0) {
          ordered.push(round);
        }
      });

      Object.keys(groupedMatches).forEach(round => {
        if (!ROUND_ORDER.includes(round) && groupedMatches[round].length > 0) {
          ordered.push(round);
        }
      });

      return ordered;
    }

    function createMatchMiniItem(match) {
      const item = document.createElement("div");
      item.className = "match-item";

      const meta = document.createElement("div");
      meta.className = "match-meta";

      const stage = match.stage || "Group";
      const group = match.group ? "Group " + match.group : "";
      const date = match.date || "";
      const venue = match.venue || "";

      const parts = [date, stage, group, venue].filter(Boolean);
      meta.textContent = parts.join(" • ");
      item.appendChild(meta);

      const homeLine = document.createElement("div");
      homeLine.className = "match-line";
      homeLine.innerHTML = `
        <div class="team-name">${match.home_team || "TBD"}</div>
        <div class="score">${match.home_score !== "" ? match.home_score : "-"}</div>
      `;

      const awayLine = document.createElement("div");
      awayLine.className = "match-line";
      awayLine.innerHTML = `
        <div class="team-name">${match.away_team || "TBD"}</div>
        <div class="score">${match.away_score !== "" ? match.away_score : "-"}</div>
      `;

      item.appendChild(homeLine);
      item.appendChild(awayLine);

      return item;
    }

    function renderNextMatches(matches) {
      const box = document.getElementById("nextMatches");
      box.innerHTML = "";

      const now = new Date();

      const upcoming = matches
        .filter(match => !isPlayedMatch(match))
        .filter(match => {
          const d = parseDate(match.date);
          return d ? d >= new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1) : true;
        })
        .sort((a, b) => {
          const da = parseDate(a.date);
          const db = parseDate(b.date);
          if (!da && !db) return 0;
          if (!da) return 1;
          if (!db) return -1;
          return da - db;
        });

      if (upcoming.length === 0) {
        box.innerHTML = '<div class="empty-note">No upcoming matches found.</div>';
        return;
      }

      upcoming.slice(0, 30).forEach(match => {
        box.appendChild(createMatchMiniItem(match));
      });
    }

    function renderRecentResults(matches) {
      const box = document.getElementById("recentResults");
      box.innerHTML = "";

      const played = matches
        .filter(match => isPlayedMatch(match))
        .sort((a, b) => {
          const da = parseDate(a.date);
          const db = parseDate(b.date);
          if (!da && !db) return 0;
          if (!da) return 1;
          if (!db) return -1;
          return db - da;
        });

      if (played.length === 0) {
        box.innerHTML = '<div class="empty-note">No recent results found.</div>';
        return;
      }

      played.slice(0, 20).forEach(match => {
        box.appendChild(createMatchMiniItem(match));
      });
    }

    function renderGroupLeaders(standings) {
      const box = document.getElementById("groupLeaders");
      box.innerHTML = "";

      const groups = {};

      standings.forEach(row => {
        const groupName = row.group || row.Group || "";
        if (!groupName) return;
        if (!groups[groupName]) groups[groupName] = [];
        groups[groupName].push(row);
      });

      const groupNames = Object.keys(groups).sort();

      if (groupNames.length === 0) {
        box.innerHTML = '<div class="empty-note">No group leader data found in standings.csv</div>';
        return;
      }

      groupNames.forEach(groupName => {
        const rows = groups[groupName];

        rows.sort((a, b) => {
          const rankA = toNumber(a.rank || a.Rank);
          const rankB = toNumber(b.rank || b.Rank);

          if (rankA !== null && rankB !== null) return rankA - rankB;

          const ptsA = toNumber(a.points || a.pts || a.Points || a.PTS);
          const ptsB = toNumber(b.points || b.pts || b.Points || b.PTS);

          if (ptsA !== null && ptsB !== null) return ptsB - ptsA;

          return 0;
        });

        const leader = rows[0];
        const teamName =
          leader.team_name ||
          leader.team ||
          leader.Team ||
          leader.name ||
          "Unknown team";

        const points =
          leader.points ||
          leader.pts ||
          leader.Points ||
          leader.PTS ||
          "-";

        const rank =
          leader.rank ||
          leader.Rank ||
          "1";

        const item = document.createElement("div");
        item.className = "leader-item";
        item.innerHTML = `
          <div class="leader-title">Group ${groupName}: ${teamName}</div>
          <div class="leader-meta">Rank: ${rank} • Points: ${points}</div>
        `;
        box.appendChild(item);
      });
    }

    function renderGroups(standings) {
      const container = document.getElementById("groupsGrid");
      container.innerHTML = "";

      const groups = {};

      standings.forEach(row => {
        const groupName = row.group || row.Group || "";
        if (!groupName) return;
        if (!groups[groupName]) groups[groupName] = [];
        groups[groupName].push(row);
      });

      const groupNames = Object.keys(groups).sort();

      if (groupNames.length === 0) {
        container.innerHTML = '<div class="empty-note">No standings data found.</div>';
        return;
      }

      groupNames.forEach(groupName => {
        const rows = groups[groupName];

        rows.sort((a, b) => {
          const rankA = toNumber(a.rank || a.Rank);
          const rankB = toNumber(b.rank || b.Rank);

          if (rankA !== null && rankB !== null) return rankA - rankB;

          const ptsA = toNumber(a.points || a.pts || a.Points || a.PTS);
          const ptsB = toNumber(b.points || b.pts || b.Points || b.PTS);

          if (ptsA !== null && ptsB !== null) return ptsB - ptsA;

          return 0;
        });

        const card = document.createElement("div");
        card.className = "group-card";

        const title = document.createElement("div");
        title.className = "group-title";
        title.textContent = "Group " + groupName;
        card.appendChild(title);

        const table = document.createElement("table");
        table.className = "group-table";

        table.innerHTML = `
          <thead>
            <tr>
              <th>#</th>
              <th>Team</th>
              <th>Pts</th>
            </tr>
          </thead>
          <tbody></tbody>
        `;

        const tbody = table.querySelector("tbody");

        rows.forEach(row => {
          const tr = document.createElement("tr");

          const rank = row.rank || row.Rank || "-";
          const team =
            row.team_name ||
            row.team ||
            row.Team ||
            row.name ||
            "-";
          const pts =
            row.points ||
            row.pts ||
            row.Points ||
            row.PTS ||
            "-";

          tr.innerHTML = `
            <td>${rank}</td>
            <td>${team}</td>
            <td>${pts}</td>
          `;
          tbody.appendChild(tr);
        });

        card.appendChild(table);
        container.appendChild(card);
      });
    }

    function createTeamRow(teamName, score, isWinner) {
      const row = document.createElement("div");
      row.className = "team-row";

      if (isWinner) row.classList.add("winner");
      if (score === null || score === undefined || score === "") row.classList.add("pending");

      const nameDiv = document.createElement("div");
      nameDiv.className = "team-name";
      nameDiv.textContent = teamName || "TBD";

      const scoreDiv = document.createElement("div");
      scoreDiv.className = "score";
      scoreDiv.textContent = (score === null || score === undefined || score === "") ? "-" : score;

      row.appendChild(nameDiv);
      row.appendChild(scoreDiv);

      return row;
    }

    function createBracketMatchCard(match) {
      const card = document.createElement("div");
      card.className = "match-card";

      const meta = document.createElement("div");
      meta.className = "match-meta";

      const parts = [
        match.match_id ? "Match #" + match.match_id : "",
        match.date || "",
        match.venue || ""
      ].filter(Boolean);

      meta.textContent = parts.join(" • ");
      card.appendChild(meta);

      const winner = getWinner(match);

      card.appendChild(
        createTeamRow(match.home_team, match.home_score, winner === "home")
      );
      card.appendChild(
        createTeamRow(match.away_team, match.away_score, winner === "away")
      );

      return card;
    }

    function renderBracket(groupedMatches) {
      const bracket = document.getElementById("bracket");
      bracket.innerHTML = "";

      const rounds = getOrderedRounds(groupedMatches);

      if (rounds.length === 0) {
        bracket.innerHTML = '<div class="empty-note">No knockout matches found in matches.csv</div>';
        return;
      }

      rounds.forEach(round => {
        const column = document.createElement("div");
        column.className = "round-column";

        const title = document.createElement("div");
        title.className = "round-title";
        title.textContent = round;

        const list = document.createElement("div");
        list.className = "match-list";

        groupedMatches[round].forEach(match => {
          list.appendChild(createBracketMatchCard(match));
        });

        column.appendChild(title);
        column.appendChild(list);
        bracket.appendChild(column);
      });
    }

    function renderSummary(teams, matches, knockoutMatches) {
      document.getElementById("statTeams").textContent = teams.length;
      document.getElementById("statMatches").textContent = matches.length;
      document.getElementById("statPlayed").textContent = matches.filter(isPlayedMatch).length;
      document.getElementById("statKnockout").textContent = knockoutMatches.length;
    }

    async function init() {
      try {
        const [teams, matches, standings] = await Promise.all([
          loadCSV("teams.csv"),
          loadCSV("matches.csv"),
          loadCSV("standings.csv")
        ]);

        console.log("TEAMS");
        console.table(teams);

        console.log("MATCHES");
        console.table(matches);

        console.log("STANDINGS");
        console.table(standings);

        const knockoutMatches = getKnockoutMatches(matches);
        const groupedMatches = groupMatchesByRound(knockoutMatches);

        renderSummary(teams, matches, knockoutMatches);
        renderNextMatches(matches);
        renderRecentResults(matches);
        renderGroupLeaders(standings);
        renderGroups(standings);
        renderBracket(groupedMatches);

        setStatus("Dashboard loaded successfully.");
      } catch (error) {
        console.error(error);
        setStatus("Error: " + error.message, true);
      }
    }

    init();
  </script>
</body>
</html>
