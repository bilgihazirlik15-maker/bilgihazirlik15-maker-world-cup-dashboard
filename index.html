<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup 2026 - Knockout Bracket</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }

    .page {
      max-width: 1600px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 10px 0;
      font-size: 32px;
      color: #ffffff;
    }

    .subtitle {
      margin: 0 0 24px 0;
      color: #94a3b8;
      font-size: 15px;
    }

    .status {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 20px;
      color: #cbd5e1;
    }

    .error {
      background: #3f1d1d;
      border-color: #7f1d1d;
      color: #fecaca;
    }

    .debug-box {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      white-space: pre-wrap;
      line-height: 1.6;
      color: #cbd5e1;
    }

    .bracket-wrapper {
      overflow-x: auto;
      padding-bottom: 10px;
    }

    .bracket {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      min-width: max-content;
    }

    .round-column {
      min-width: 260px;
      flex: 0 0 260px;
    }

    .round-title {
      position: sticky;
      top: 0;
      background: #1e293b;
      color: #ffffff;
      padding: 12px 14px;
      border-radius: 12px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 14px;
      border: 1px solid #334155;
      z-index: 2;
    }

    .match-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .match-card {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    }

    .match-meta {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .team-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #1f2937;
      margin-bottom: 8px;
    }

    .team-row:last-child {
      margin-bottom: 0;
    }

    .team-name {
      font-size: 14px;
      font-weight: 600;
      color: #f8fafc;
      flex: 1;
    }

    .team-score {
      min-width: 28px;
      text-align: center;
      font-size: 16px;
      font-weight: bold;
      color: #ffffff;
    }

    .winner {
      border: 1px solid #16a34a;
      background: #052e16;
    }

    .pending {
      opacity: 0.8;
    }

    .empty-note {
      background: #111827;
      border: 1px dashed #475569;
      border-radius: 12px;
      padding: 18px;
      color: #94a3b8;
    }

    .legend {
      margin-top: 18px;
      color: #94a3b8;
      font-size: 13px;
    }

    @media (max-width: 700px) {
      .page {
        padding: 16px;
      }

      h1 {
        font-size: 24px;
      }

      .round-column {
        min-width: 230px;
        flex-basis: 230px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>World Cup 2026 Knockout Bracket</h1>
    <p class="subtitle">
      DEBUG VERSION - Real knockout matches are read directly from <strong>matches.csv</strong>
    </p>

    <div id="status" class="status">Loading matches.csv...</div>

    <div id="debug" class="debug-box">Debug info will appear here...</div>

    <div class="bracket-wrapper">
      <div id="bracket" class="bracket"></div>
    </div>

    <div class="legend">
      Green team row = winner (if both scores exist)
    </div>
  </div>

  <script>
    const ROUND_ORDER = [
      "Round of 32",
      "Round of 16",
      "Quarter-final",
      "Quarter-finals",
      "Semi-final",
      "Semi-finals",
      "Third place",
      "Final"
    ];

    function setStatus(message, isError = false) {
      const box = document.getElementById("status");
      box.textContent = message;
      box.className = isError ? "status error" : "status";
    }

    function setDebug(message) {
      document.getElementById("debug").textContent = message;
    }

    async function loadCSV(path) {
      const response = await fetch(path);
      if (!response.ok) {
        throw new Error("Could not load " + path);
      }

      const text = await response.text();
      return parseCSV(text);
    }

    function parseCSV(text) {
      const lines = text.trim().split(/\r?\n/);
      if (lines.length < 2) return [];

      const headers = splitCSVLine(lines[0]).map(h => h.trim());

      const rows = [];
      for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;

        const values = splitCSVLine(lines[i]);
        const row = {};

        headers.forEach((header, index) => {
          row[header] = (values[index] || "").trim();
        });

        rows.push(row);
      }

      return rows;
    }

    function splitCSVLine(line) {
      const result = [];
      let current = "";
      let insideQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const next = line[i + 1];

        if (char === '"' && insideQuotes && next === '"') {
          current += '"';
          i++;
        } else if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === ',' && !insideQuotes) {
          result.push(current);
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current);
      return result;
    }

    function getKnockoutMatches(matches) {
      return matches.filter(match => {
        const stage = (match.stage || match.Stage || "").trim().toLowerCase();

        return (
          stage.includes("round") ||
          stage.includes("quarter") ||
          stage.includes("semi") ||
          stage === "final" ||
          stage.includes("third")
        );
      });
    }

    function groupMatchesByRound(matches) {
      const grouped = {};

      ROUND_ORDER.forEach(round => {
        grouped[round] = [];
      });

      matches.forEach(match => {
        const stage = (match.stage || match.Stage || "").trim();

        if (!grouped[stage]) {
          grouped[stage] = [];
        }

        grouped[stage].push(match);
      });

      return grouped;
    }

    function getOrderedRounds(groupedMatches) {
      const ordered = [];

      ROUND_ORDER.forEach(round => {
        if (groupedMatches[round] && groupedMatches[round].length > 0) {
          ordered.push(round);
        }
      });

      Object.keys(groupedMatches).forEach(round => {
        if (!ROUND_ORDER.includes(round) && groupedMatches[round].length > 0) {
          ordered.push(round);
        }
      });

      return ordered;
    }

    function toNumber(value) {
      if (value === null || value === undefined || value === "") return null;
      const num = Number(value);
      return Number.isNaN(num) ? null : num;
    }

    function getWinner(match) {
      const homeScore = toNumber(match.home_score);
      const awayScore = toNumber(match.away_score);

      if (homeScore === null || awayScore === null) return null;
      if (homeScore > awayScore) return "home";
      if (awayScore > homeScore) return "away";
      return "draw";
    }

    function createTeamRow(teamName, score, isWinner) {
      const row = document.createElement("div");
      row.className = "team-row";

      if (isWinner) {
        row.classList.add("winner");
      }

      if (score === null || score === undefined || score === "") {
        row.classList.add("pending");
      }

      const nameDiv = document.createElement("div");
      nameDiv.className = "team-name";
      nameDiv.textContent = teamName || "TBD";

      const scoreDiv = document.createElement("div");
      scoreDiv.className = "team-score";
      scoreDiv.textContent = (score === null || score === undefined || score === "") ? "-" : score;

      row.appendChild(nameDiv);
      row.appendChild(scoreDiv);

      return row;
    }

    function createMatchCard(match) {
      const card = document.createElement("div");
      card.className = "match-card";

      const meta = document.createElement("div");
      meta.className = "match-meta";

      const matchId = match.match_id || "";
      const date = match.date || "";
      const venue = match.venue || "";

      let metaText = "";
      if (matchId) metaText += "Match #" + matchId;
      if (date) metaText += (metaText ? " • " : "") + date;
      if (venue) metaText += (metaText ? " • " : "") + venue;

      meta.textContent = metaText || "Knockout match";
      card.appendChild(meta);

      const winner = getWinner(match);

      const homeRow = createTeamRow(
        match.home_team,
        match.home_score,
        winner === "home"
      );

      const awayRow = createTeamRow(
        match.away_team,
        match.away_score,
        winner === "away"
      );

      card.appendChild(homeRow);
      card.appendChild(awayRow);

      return card;
    }

    function renderBracket(groupedMatches) {
      const bracket = document.getElementById("bracket");
      bracket.innerHTML = "";

      const rounds = getOrderedRounds(groupedMatches);

      if (rounds.length === 0) {
        bracket.innerHTML = '<div class="empty-note">No knockout matches were found in matches.csv</div>';
        return;
      }

      rounds.forEach(round => {
        const column = document.createElement("div");
        column.className = "round-column";

        const title = document.createElement("div");
        title.className = "round-title";
        title.textContent = round;

        const list = document.createElement("div");
        list.className = "match-list";

        groupedMatches[round].forEach(match => {
          list.appendChild(createMatchCard(match));
        });

        column.appendChild(title);
        column.appendChild(list);
        bracket.appendChild(column);
      });
    }

    async function init() {
      try {
        const matches = await loadCSV("matches.csv");

        const knockoutMatches = getKnockoutMatches(matches);
        const groupedMatches = groupMatchesByRound(knockoutMatches);

        const headers = matches.length > 0 ? Object.keys(matches[0]) : [];
        const stageValues = [...new Set(matches.map(m => (m.stage || m.Stage || "").trim()))];
        const sampleRows = matches.slice(0, 5);

        let debugText = "";
        debugText += "TOTAL MATCHES: " + matches.length + "\n\n";
        debugText += "HEADERS FOUND:\n" + headers.join(", ") + "\n\n";
        debugText += "UNIQUE STAGE VALUES:\n" + (stageValues.length ? stageValues.join(" | ") : "(none)") + "\n\n";
        debugText += "KNOCKOUT MATCH COUNT: " + knockoutMatches.length + "\n\n";
        debugText += "FIRST 5 ROWS:\n" + JSON.stringify(sampleRows, null, 2);

        setDebug(debugText);

        console.log("ALL MATCHES:");
        console.table(matches);

        console.log("UNIQUE STAGE VALUES:");
        console.log(stageValues);

        console.log("KNOCKOUT MATCHES:");
        console.table(knockoutMatches);

        renderBracket(groupedMatches);

        setStatus("matches.csv loaded successfully. Knockout bracket is now reading real knockout matches.");
      } catch (error) {
        console.error(error);
        setStatus("Error: " + error.message, true);
        setDebug("ERROR DETAILS:\n" + error.message);
      }
    }

    init();
  </script>
</body>
</html>
