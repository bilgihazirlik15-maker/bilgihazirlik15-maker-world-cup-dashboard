  <script>
    let allUpcomingMatches = [];
    let nextMatchesFilter = "all";
    let showAllNextMatches = false;

    let allRecentResults = [];
    let showAllRecentResults = false;

    const KNOCKOUT_ROUND_ORDER = [
      "Round of 32",
      "Round of 16",
      "Quarter-final",
      "Semi-final",
      "Final"
    ];

    function setStatus(message, isError = false) {
      const box = document.getElementById("status");
      box.textContent = message;
      box.className = isError ? "status error" : "status";
    }

    async function loadCSV(path) {
      const response = await fetch(path);
      if (!response.ok) {
        throw new Error("Could not load " + path);
      }
      const text = await response.text();
      return parseCSV(text);
    }

    function parseCSV(text) {
      const lines = text.trim().split(/\r?\n/);
      if (lines.length < 2) return [];

      const headers = splitCSVLine(lines[0]).map(h => h.trim());
      const rows = [];

      for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;

        const values = splitCSVLine(lines[i]);
        const row = {};

        headers.forEach((header, index) => {
          row[header] = (values[index] || "").trim();
        });

        rows.push(row);
      }

      return rows;
    }

    function splitCSVLine(line) {
      const result = [];
      let current = "";
      let insideQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const next = line[i + 1];

        if (char === '"' && insideQuotes && next === '"') {
          current += '"';
          i++;
        } else if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === ',' && !insideQuotes) {
          result.push(current);
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current);
      return result;
    }

    function toNumber(value) {
      if (value === null || value === undefined || value === "") return null;
      const n = Number(value);
      return Number.isNaN(n) ? null : n;
    }

function getCountryCode(teamName) {

}
function withFlag(teamName) {
  const cleanName = (teamName || "TBD").toString().trim();
  const code = getCountryCode(cleanName);

  if (!code) {
    return cleanName;
  }

  return `<img class="flag-icon" src="https://flagcdn.com/w20/${code}.png" alt="${cleanName} flag"> ${cleanName}`;
}
    
    function parseMatchDate(dateStr, timeStr) {
      if (!dateStr) return null;

      const months = {
        Jan: 0, Feb: 1, Mar: 2, Apr: 3, May: 4, Jun: 5,
        Jul: 6, Aug: 7, Sep: 8, Oct: 9, Nov: 10, Dec: 11
      };

      const parts = dateStr.split("-");
      if (parts.length !== 3) return null;

      const day = Number(parts[0]);
      const month = months[parts[1]];
      const year = 2000 + Number(parts[2]);

      if (Number.isNaN(day) || month === undefined || Number.isNaN(year)) {
        return null;
      }

      let hour = 0;
      let minute = 0;

      if (timeStr && timeStr.includes(":")) {
        const timeParts = timeStr.split(":");
        hour = Number(timeParts[0]);
        minute = Number(timeParts[1]);
      }

      return new Date(year, month, day, hour, minute);
    }

    function isPlayedMatch(match) {
      const homeRaw = (match.home_score ?? "").toString().trim();
      const awayRaw = (match.away_score ?? "").toString().trim();

      if (homeRaw === "" || awayRaw === "") {
        return false;
      }

      const home = Number(homeRaw);
      const away = Number(awayRaw);

      return !Number.isNaN(home) && !Number.isNaN(away);
    }

    function getTodayStart() {
      const now = new Date();
      return new Date(now.getFullYear(), now.getMonth(), now.getDate());
    }

    function getTomorrowStart() {
      const today = getTodayStart();
      return new Date(today.getFullYear(), today.getMonth(), today.getDate() + 1);
    }

    function getDayAfterTomorrowStart() {
      const today = getTodayStart();
      return new Date(today.getFullYear(), today.getMonth(), today.getDate() + 2);
    }

    function getMatchDayLabel(match) {
      const matchDate = parseMatchDate(match.match_date, match.match_time);
      if (!matchDate) return "Upcoming";

      const todayStart = getTodayStart();
      const tomorrowStart = getTomorrowStart();
      const dayAfterTomorrowStart = getDayAfterTomorrowStart();
      const matchDayStart = new Date(matchDate.getFullYear(), matchDate.getMonth(), matchDate.getDate());

      if (matchDayStart.getTime() === todayStart.getTime()) return "Today";
      if (matchDayStart.getTime() === tomorrowStart.getTime()) return "Tomorrow";
      if (matchDayStart >= dayAfterTomorrowStart) return "Upcoming";
      return "Upcoming";
    }

    function getMatchTagClass(label) {
      if (label === "Today") return "match-tag tag-today";
      if (label === "Tomorrow") return "match-tag tag-tomorrow";
      return "match-tag tag-upcoming";
    }

    function formatMatchMeta(match) {
      const parts = [];

      if (match.match_date) parts.push(match.match_date);
      if (match.match_time) parts.push(match.match_time);
      if (match.stage) parts.push(match.stage);
      if (match.group_name) parts.push("Group " + match.group_name);
      if (match.city) parts.push(match.city);

      return parts.join(" • ");
    }

    function createMatchItem(match, showDayTag = false, resultIndex = null) {
      const item = document.createElement("div");
      item.className = "match-item";

      if (showDayTag) {
        const label = getMatchDayLabel(match);
        const tag = document.createElement("div");
        tag.className = getMatchTagClass(label);
        tag.textContent = label;
        item.appendChild(tag);
      }

      if (resultIndex !== null) {
        const tag = document.createElement("div");
        tag.className = "result-tag";
        tag.textContent = "Result #" + resultIndex;
        item.appendChild(tag);
      }

      const meta = document.createElement("div");
      meta.className = "match-meta";
      meta.textContent = formatMatchMeta(match);
      item.appendChild(meta);

      const homeTeamText = withFlag(match.home_team);
      const awayTeamText = withFlag(match.away_team);

      const homeLine = document.createElement("div");
      homeLine.className = "match-line";
      homeLine.innerHTML = `
        <div class="team-name">${homeTeamText}</div>
        <div class="score">${match.home_score !== "" ? match.home_score : "-"}</div>
      `;

      const awayLine = document.createElement("div");
      awayLine.className = "match-line";
      awayLine.innerHTML = `
        <div class="team-name">${awayTeamText}</div>
        <div class="score">${match.away_score !== "" ? match.away_score : "-"}</div>
      `;

      item.appendChild(homeLine);
      item.appendChild(awayLine);

      return item;
    }

    function setActiveNextFilterButton() {
      document.getElementById("filterAllBtn").classList.toggle("active", nextMatchesFilter === "all");
      document.getElementById("filterTodayBtn").classList.toggle("active", nextMatchesFilter === "today");
      document.getElementById("filterTomorrowBtn").classList.toggle("active", nextMatchesFilter === "tomorrow");
    }

    function getFilteredUpcomingMatches() {
      if (nextMatchesFilter === "today") {
        return allUpcomingMatches.filter(match => getMatchDayLabel(match) === "Today");
      }

      if (nextMatchesFilter === "tomorrow") {
        return allUpcomingMatches.filter(match => getMatchDayLabel(match) === "Tomorrow");
      }

      return allUpcomingMatches;
    }

    function updateNextMatchesView() {
      const box = document.getElementById("nextMatches");
      const countBox = document.getElementById("nextMatchesCount");
      const toggleBtn = document.getElementById("nextToggleBtn");

      box.innerHTML = "";
      setActiveNextFilterButton();

      const filteredMatches = getFilteredUpcomingMatches();

      if (filteredMatches.length === 0) {
        countBox.textContent = "0 matches";
        toggleBtn.style.display = "none";
        box.innerHTML = '<div class="empty-note">No matches found for this filter.</div>';
        return;
      }

      const visibleMatches = showAllNextMatches ? filteredMatches : filteredMatches.slice(0, 10);

      countBox.textContent = showAllNextMatches
        ? "Showing all " + filteredMatches.length + " matches"
        : "Showing " + Math.min(10, filteredMatches.length) + " of " + filteredMatches.length + " matches";

      visibleMatches.forEach(match => {
        box.appendChild(createMatchItem(match, true));
      });

      if (filteredMatches.length <= 10) {
        toggleBtn.style.display = "none";
      } else {
        toggleBtn.style.display = "inline-block";
        toggleBtn.textContent = showAllNextMatches ? "Show Less" : "Show More";
      }
    }

    function renderNextMatches(matches) {
      allUpcomingMatches = matches
        .filter(match => !isPlayedMatch(match))
        .sort((a, b) => {
          const da = parseMatchDate(a.match_date, a.match_time);
          const db = parseMatchDate(b.match_date, b.match_time);
          if (!da && !db) return 0;
          if (!da) return 1;
          if (!db) return -1;
          return da - db;
        });

      nextMatchesFilter = "all";
      showAllNextMatches = false;
      updateNextMatchesView();
    }

    function updateRecentResultsView() {
      const box = document.getElementById("recentResults");
      const countBox = document.getElementById("recentResultsCount");
      const toggleBtn = document.getElementById("recentToggleBtn");

      box.innerHTML = "";

      if (allRecentResults.length === 0) {
        countBox.textContent = "0 results";
        toggleBtn.textContent = "Show More";
        toggleBtn.classList.add("disabled");
        box.innerHTML = '<div class="empty-note">No recent results found.</div>';
        return;
      }

      const visibleResults = showAllRecentResults ? allRecentResults : allRecentResults.slice(0, 10);

      countBox.textContent = showAllRecentResults
        ? "Showing all " + allRecentResults.length + " results"
        : "Showing " + Math.min(10, allRecentResults.length) + " of " + allRecentResults.length + " results";

      visibleResults.forEach((match, index) => {
        box.appendChild(createMatchItem(match, false, index + 1));
      });

      if (allRecentResults.length <= 10) {
        toggleBtn.textContent = "Show More";
        toggleBtn.classList.add("disabled");
      } else {
        toggleBtn.textContent = showAllRecentResults ? "Show Less" : "Show More";
        toggleBtn.classList.remove("disabled");
      }
    }

    function renderRecentResults(matches) {
      allRecentResults = matches
        .filter(match => isPlayedMatch(match))
        .sort((a, b) => {
          const da = parseMatchDate(a.match_date, a.match_time);
          const db = parseMatchDate(b.match_date, b.match_time);
          if (!da && !db) return 0;
          if (!da) return 1;
          if (!db) return -1;
          return db - da;
        });

      showAllRecentResults = false;
      updateRecentResultsView();
    }

    function createBlankStanding(groupName, teamName) {
      return {
        group_name: groupName,
        team_name: teamName,
        rank: 0,
        played: 0,
        won: 0,
        draw: 0,
        lost: 0,
        gf: 0,
        ga: 0,
        gd: 0,
        points: 0
      };
    }

    function buildGroupStandings(matches, teams) {
      const table = {};

      teams.forEach(teamRow => {
        const teamName = (teamRow.team_name || teamRow.team || teamRow.Team || teamRow.name || "").toString().trim();
        const groupName = (teamRow.group_name || teamRow.group || teamRow.Group || "").toString().trim();

        if (!teamName || !groupName) return;

        if (!table[groupName]) table[groupName] = {};
        if (!table[groupName][teamName]) {
          table[groupName][teamName] = createBlankStanding(groupName, teamName);
        }
      });

      matches.forEach(match => {
        const stage = (match.stage || "").toString().trim().toLowerCase();
        const groupName = (match.group_name || "").toString().trim();
        const homeTeam = (match.home_team || "").toString().trim();
        const awayTeam = (match.away_team || "").toString().trim();

        if (stage !== "group") return;
        if (!groupName || !homeTeam || !awayTeam) return;

        if (!table[groupName]) table[groupName] = {};

        if (!table[groupName][homeTeam]) {
          table[groupName][homeTeam] = createBlankStanding(groupName, homeTeam);
        }
        if (!table[groupName][awayTeam]) {
          table[groupName][awayTeam] = createBlankStanding(groupName, awayTeam);
        }

        const homeRaw = (match.home_score ?? "").toString().trim();
        const awayRaw = (match.away_score ?? "").toString().trim();

        if (homeRaw === "" || awayRaw === "") return;

        const homeScore = Number(homeRaw);
        const awayScore = Number(awayRaw);

        if (Number.isNaN(homeScore) || Number.isNaN(awayScore)) return;

        const home = table[groupName][homeTeam];
        const away = table[groupName][awayTeam];

        home.played += 1;
        away.played += 1;

        home.gf += homeScore;
        home.ga += awayScore;
        away.gf += awayScore;
        away.ga += homeScore;

        home.gd = home.gf - home.ga;
        away.gd = away.gf - away.ga;

        if (homeScore > awayScore) {
          home.won += 1;
          home.points += 3;
          away.lost += 1;
        } else if (awayScore > homeScore) {
          away.won += 1;
          away.points += 3;
          home.lost += 1;
        } else {
          home.draw += 1;
          away.draw += 1;
          home.points += 1;
          away.points += 1;
        }
      });

      const groupedRows = {};

      Object.keys(table).forEach(groupName => {
        const rows = Object.values(table[groupName]);

        rows.sort((a, b) => {
          if (b.points !== a.points) return b.points - a.points;
          if (b.gd !== a.gd) return b.gd - a.gd;
          if (b.gf !== a.gf) return b.gf - a.gf;
          return a.team_name.localeCompare(b.team_name);
        });

        rows.forEach((row, index) => {
          row.rank = index + 1;
        });

        groupedRows[groupName] = rows;
      });

      return groupedRows;
    }

    function renderGroupLeadersFromMatches(groupedStandings) {
      const box = document.getElementById("groupLeaders");
      box.innerHTML = "";

      const groupNames = Object.keys(groupedStandings).sort();

      if (groupNames.length === 0) {
        box.innerHTML = '<div class="empty-note">No group leader data available.</div>';
        return;
      }

      groupNames.forEach(groupName => {
        const leader = groupedStandings[groupName][0];
        if (!leader) return;

        const item = document.createElement("div");
        item.className = "leader-item";
        item.innerHTML = `
          <div class="leader-title">Group ${groupName}: ${withFlag(leader.team_name)}</div>
          <div class="leader-meta">Rank: ${leader.rank} • Points: ${leader.points}</div>

          <div class="leader-stats">
            <div class="leader-stat-box">
              <div class="leader-stat-label">Played</div>
              <div class="leader-stat-value">${leader.played}</div>
            </div>
            <div class="leader-stat-box">
              <div class="leader-stat-label">Goal Diff</div>
              <div class="leader-stat-value">${leader.gd}</div>
            </div>
            <div class="leader-stat-box">
              <div class="leader-stat-label">Goals For</div>
              <div class="leader-stat-value">${leader.gf}</div>
            </div>
          </div>

          <div class="leader-extra">
            W-D-L: ${leader.won}-${leader.draw}-${leader.lost}<br>
            Goals: ${leader.gf} for / ${leader.ga} against
          </div>
        `;
        box.appendChild(item);
      });
    }

    function renderGroupsFromMatches(groupedStandings) {
      const container = document.getElementById("groupsGrid");
      container.innerHTML = "";

      const groupNames = Object.keys(groupedStandings).sort();

      if (groupNames.length === 0) {
        container.innerHTML = '<div class="empty-note">No group standings available.</div>';
        return;
      }

      groupNames.forEach(groupName => {
        const rows = groupedStandings[groupName];

        const card = document.createElement("div");
        card.className = "group-card";

        const title = document.createElement("div");
        title.className = "group-title";
        title.textContent = "Group " + groupName;
        card.appendChild(title);

        const table = document.createElement("table");
        table.className = "group-table";

        table.innerHTML = `
          <thead>
            <tr>
              <th>#</th>
              <th>Team</th>
              <th>P</th>
              <th>W</th>
              <th>D</th>
              <th>L</th>
              <th>GF</th>
              <th>GA</th>
              <th>GD</th>
              <th>Pts</th>
            </tr>
          </thead>
          <tbody></tbody>
        `;

        const tbody = table.querySelector("tbody");

        rows.forEach(row => {
          const tr = document.createElement("tr");

          if (row.rank === 1) {
            tr.classList.add("group-winner");
          } else if (row.rank === 2) {
            tr.classList.add("group-qualified");
          }

          tr.innerHTML = `
            <td>${row.rank}</td>
            <td>${row.rank === 1 ? "🥇 " : ""}${withFlag(row.team_name)}</td>
            <td>${row.played}</td>
            <td>${row.won}</td>
            <td>${row.draw}</td>
            <td>${row.lost}</td>
            <td>${row.gf}</td>
            <td>${row.ga}</td>
            <td>${row.gd}</td>
            <td>${row.points}</td>
          `;

          tbody.appendChild(tr);
        });

        card.appendChild(table);
        container.appendChild(card);
      });
    }

    function getKnockoutMatches(matches) {
      return matches.filter(match => {
        const stage = (match.stage || "").trim();
        return stage === "Third place" || KNOCKOUT_ROUND_ORDER.includes(stage);
      });
    }

    function groupKnockoutMatchesByRound(knockoutMatches) {
      const grouped = {};
      [...KNOCKOUT_ROUND_ORDER, "Third place"].forEach(round => {
        grouped[round] = [];
      });

      knockoutMatches.forEach(match => {
        const stage = (match.stage || "").trim();
        if (!grouped[stage]) {
          grouped[stage] = [];
        }
        grouped[stage].push(match);
      });

      Object.keys(grouped).forEach(round => {
        grouped[round].sort((a, b) => {
          const da = parseMatchDate(a.match_date, a.match_time);
          const db = parseMatchDate(b.match_date, b.match_time);
          if (!da && !db) return 0;
          if (!da) return 1;
          if (!db) return -1;
          return da - db;
        });
      });

      return grouped;
    }

    function getKnockoutWinner(match) {
      const homeRaw = (match.home_score ?? "").toString().trim();
      const awayRaw = (match.away_score ?? "").toString().trim();

      if (homeRaw === "" || awayRaw === "") return null;

      const home = Number(homeRaw);
      const away = Number(awayRaw);

      if (Number.isNaN(home) || Number.isNaN(away)) return null;

      if (home > away) return "home";
      if (away > home) return "away";
      return null;
    }

    function createBracketMatchCard(match, isLastColumn, extraClass = "") {
      const card = document.createElement("div");
      card.className = "bracket-match-card" + (extraClass ? " " + extraClass : "");

      if (!isLastColumn) {
        const line = document.createElement("div");
        line.className = "bracket-line-top";
        card.appendChild(line);

        const dot = document.createElement("div");
        dot.className = "bracket-line-dot";
        card.appendChild(dot);
      }

      const meta = document.createElement("div");
      meta.className = "bracket-meta";

      const parts = [];
      if (match.match_date) parts.push(match.match_date);
      if (match.match_time) parts.push(match.match_time);
      if (match.city) parts.push(match.city);
      if (match.venue) parts.push(match.venue);

      meta.textContent = parts.join(" • ");
      card.appendChild(meta);

      const winner = getKnockoutWinner(match);

      const homeTeamName = (match.home_team || "TBD").toString().trim();
      const awayTeamName = (match.away_team || "TBD").toString().trim();

      const homeScoreText = (match.home_score ?? "").toString().trim();
      const awayScoreText = (match.away_score ?? "").toString().trim();

      const homeName = winner === "home" ? `✓ ${withFlag(homeTeamName)}` : withFlag(homeTeamName);
      const awayName = winner === "away" ? `✓ ${withFlag(awayTeamName)}` : withFlag(awayTeamName);

      const homeRow = document.createElement("div");
      homeRow.className = "bracket-team-row" + (winner === "home" ? " winner-row" : "");
      homeRow.innerHTML = `
        <div class="team-name">${homeName}</div>
        <div class="score">${homeScoreText !== "" ? homeScoreText : "-"}</div>
      `;

      const awayRow = document.createElement("div");
      awayRow.className = "bracket-team-row" + (winner === "away" ? " winner-row" : "");
      awayRow.innerHTML = `
        <div class="team-name">${awayName}</div>
        <div class="score">${awayScoreText !== "" ? awayScoreText : "-"}</div>
      `;

      card.appendChild(homeRow);
      card.appendChild(awayRow);

      return card;
    }

    function renderBracket(matches) {
      const bracket = document.getElementById("bracket");
      bracket.innerHTML = "";

      const knockoutMatches = getKnockoutMatches(matches);

      if (knockoutMatches.length === 0) {
        bracket.innerHTML = '<div class="empty-note">No knockout matches found in matches.csv</div>';
        return;
      }

      const grouped = groupKnockoutMatchesByRound(knockoutMatches);

      KNOCKOUT_ROUND_ORDER.forEach(round => {
        const roundMatches = grouped[round];
        if (!roundMatches || roundMatches.length === 0) return;

        const isLastColumn = round === "Final";

        const column = document.createElement("div");
        column.className = "round-column" + (isLastColumn ? " final-column" : "");

        const title = document.createElement("div");
        title.className = "round-title";
        title.textContent = round;

        const list = document.createElement("div");
        list.className = "bracket-match-list";

        roundMatches.forEach(match => {
          const extraClass = isLastColumn ? "main-final" : "";
          list.appendChild(createBracketMatchCard(match, isLastColumn, extraClass));
        });

        column.appendChild(title);
        column.appendChild(list);

        if (isLastColumn && grouped["Third place"] && grouped["Third place"].length > 0) {
          const thirdBlock = document.createElement("div");
          thirdBlock.className = "third-place-block";

          const thirdLabel = document.createElement("div");
          thirdLabel.className = "third-place-label";
          thirdLabel.textContent = "Third Place Match";
          thirdBlock.appendChild(thirdLabel);

          grouped["Third place"].forEach(match => {
            thirdBlock.appendChild(createBracketMatchCard(match, true));
          });

          column.appendChild(thirdBlock);
        }

        bracket.appendChild(column);
      });
    }

    function renderSummary(teams, matches) {
      const played = matches.filter(isPlayedMatch).length;
      const upcoming = matches.filter(match => !isPlayedMatch(match)).length;

      document.getElementById("statTeams").textContent = teams.length;
      document.getElementById("statMatches").textContent = matches.length;
      document.getElementById("statPlayed").textContent = played;
      document.getElementById("statUpcoming").textContent = upcoming;
    }

    function setupNextMatchesControls() {
      document.getElementById("nextToggleBtn").addEventListener("click", function () {
        showAllNextMatches = !showAllNextMatches;
        updateNextMatchesView();
      });

      document.getElementById("filterAllBtn").addEventListener("click", function () {
        nextMatchesFilter = "all";
        showAllNextMatches = false;
        updateNextMatchesView();
      });

      document.getElementById("filterTodayBtn").addEventListener("click", function () {
        nextMatchesFilter = "today";
        showAllNextMatches = false;
        updateNextMatchesView();
      });

      document.getElementById("filterTomorrowBtn").addEventListener("click", function () {
        nextMatchesFilter = "tomorrow";
        showAllNextMatches = false;
        updateNextMatchesView();
      });
    }

    function setupRecentResultsControls() {
      document.getElementById("recentToggleBtn").addEventListener("click", function () {
        if (allRecentResults.length <= 10) return;
        showAllRecentResults = !showAllRecentResults;
        updateRecentResultsView();
      });
    }

    async function init() {
      try {
        const [teams, matches] = await Promise.all([
          loadCSV("teams.csv"),
          loadCSV("matches.csv")
        ]);

        const groupedStandings = buildGroupStandings(matches, teams);

        renderSummary(teams, matches);
        renderNextMatches(matches);
        renderRecentResults(matches);
        renderGroupLeadersFromMatches(groupedStandings);
        renderGroupsFromMatches(groupedStandings);
        renderBracket(matches);

        setupNextMatchesControls();
        setupRecentResultsControls();

        setStatus("Dashboard loaded successfully.");
      } catch (error) {
        console.error(error);
        setStatus("Error: " + error.message, true);
      }
    }

    init();
  </script>
</body>
</html>
