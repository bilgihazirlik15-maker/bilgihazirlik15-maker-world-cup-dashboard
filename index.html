<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>World Cup 2026 Dashboard</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#07111f;
      color:white;
    }

    .container{
      padding:20px;
    }

    h1{
      margin-bottom:20px;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap:16px;
    }

    .card{
      background:#0f1b2d;
      border-radius:12px;
      padding:12px;
      border:1px solid #223654;
    }

    .group-title{
      font-weight:bold;
      margin-bottom:10px;
      font-size:18px;
      border-bottom:1px solid #223654;
      padding-bottom:6px;
    }

    .team{
      display:flex;
      align-items:center;
      gap:8px;
      padding:6px 0;
      font-size:14px;
    }

    .team img{
      width:20px;
      height:14px;
      object-fit:cover;
      border-radius:2px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      margin-bottom:20px;
    }

    .btn{
      background:#3aa0ff;
      padding:10px 14px;
      border-radius:8px;
      text-decoration:none;
      color:white;
      font-weight:bold;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="topbar">
      <h1>World Cup 2026 Dashboard</h1>
      <a class="btn" href="./draw/index.html">🎰 Draw'a Git</a>
    </div>

    <div id="groups" class="grid"></div>

  </div>

<script>
async function loadData(){

  const res = await fetch("teams.csv");
  const text = await res.text();

  const rows = text.trim().split("\n").slice(1);

  const teams = rows.map(row => {
    const cols = row.split(",");

    return {
      team_name: cols[1],
      group: cols[2],          // group_name
      short_name: cols[3],
      flag: cols[4]
    };
  });

  buildGroups(teams);
}

function buildGroups(teams){

  const groups = {};

  // GRUPLARI OLUŞTUR
  teams.forEach(t => {
    const g = t.group;

    if(!groups[g]){
      groups[g] = [];
    }

    groups[g].push(t);
  });

  render(groups);
}

function render(groups){

  const container = document.getElementById("groups");

  const sortedGroups = Object.keys(groups).sort();

  container.innerHTML = sortedGroups.map(g => {

    const teams = groups[g];

    return `
      <div class="card">
        <div class="group-title">Group ${g}</div>

        ${teams.map(t => `
          <div class="team">
            <img src="${t.flag}" />
            <span>${t.team_name}</span>
          </div>
        `).join("")}

      </div>
    `;
  }).join("");

}

loadData();
</script>

</body>
</html>
