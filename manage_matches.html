<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Match Management Panel</title>
  <style>
    body { font-family: sans-serif; background: #0b1833; color: #fff; padding: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #102242; }
    th, td { padding: 10px; border: 1px solid #31476f; text-align: center; }
    input { width: 60px; padding: 5px; background: #0d1d39; border: 1px solid #31476f; color: #fff; text-align: center; }
    button { padding: 10px 20px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; }
    .btn-save { background: #22c55e; color: #fff; }
    .btn-clear { background: #ef4444; color: #fff; }
    .controls { display: flex; gap: 10px; margin-bottom: 20px; }
    .status { margin: 12px 0; color: #c7d2fe; }
    .error { color: #fecaca; }
  </style>
</head>
<body>
  <h1>Manage Match Results</h1>

  <div class="controls">
    <button class="btn-clear" onclick="clearAllScores()">Clear All Scores</button>
    <button class="btn-save" onclick="downloadCSV()">Save & Download CSV</button>
  </div>

  <div id="status" class="status">Loading matches.csv...</div>

  <table id="matchTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Stage</th>
        <th>Home Team</th>
        <th>Away Team</th>
        <th>Home Score</th>
        <th>Away Score</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    let matches = [];

    async function loadMatchesCSV() {
      try {
        const response = await fetch("./matches.csv");

        if (!response.ok) {
          throw new Error("matches.csv could not be loaded.");
        }

        const text = await response.text();
        parseCSV(text);
        document.getElementById("status").textContent = "matches.csv loaded successfully.";
      } catch (error) {
        document.getElementById("status").textContent = error.message;
        document.getElementById("status").classList.add("error");
        console.error(error);
      }
    }

    function splitCSVLine(line) {
      const result = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const next = line[i + 1];

        if (char === '"' && inQuotes && next === '"') {
          current += '"';
          i++;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === "," && !inQuotes) {
          result.push(current);
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current);
      return result;
    }

    function parseCSV(text) {
      const clean = text.replace(/^\uFEFF/, "").trim();
      const lines = clean.split(/\r?\n/).filter(line => line.trim() !== "");

      if (lines.length < 2) {
        throw new Error("matches.csv is empty or invalid.");
      }

      const headers = splitCSVLine(lines[0]).map(h => h.trim());

      if (!headers.includes("match_id") || !headers.includes("home_team") || !headers.includes("away_team")) {
        throw new Error("Wrong file loaded. Expected matches.csv with match_id, home_team, away_team columns.");
      }

      matches = lines.slice(1).map(line => {
        const values = splitCSVLine(line);
        const row = {};
        headers.forEach((header, index) => {
          row[header] = (values[index] || "").trim();
        });
        return row;
      });

      renderTable();
    }

    function renderTable() {
      const tbody = document.querySelector("#matchTable tbody");
      tbody.innerHTML = "";

      matches.forEach((m, i) => {
        tbody.innerHTML += `
          <tr>
            <td>${m.match_id || ""}</td>
            <td>${m.stage || ""}</td>
            <td>${m.home_team || ""}</td>
            <td>${m.away_team || ""}</td>
            <td><input type="number" value="${m.home_score || ""}" onchange="updateScore(${i}, 'home_score', this.value)"></td>
            <td><input type="number" value="${m.away_score || ""}" onchange="updateScore(${i}, 'away_score', this.value)"></td>
          </tr>
        `;
      });
    }

    function updateScore(index, key, value) {
      matches[index][key] = value;
    }

    function clearAllScores() {
      matches.forEach(m => {
        m.home_score = "";
        m.away_score = "";
      });
      renderTable();
    }

    function escapeCSV(value) {
      const text = String(value ?? "");
      if (text.includes(",") || text.includes('"') || text.includes("\n")) {
        return '"' + text.replace(/"/g, '""') + '"';
      }
      return text;
    }

    function downloadCSV() {
      const headers = [
        "match_id",
        "stage",
        "group_name",
        "match_date",
        "match_time",
        "home_team",
        "away_team",
        "home_score",
        "away_score",
        "status",
        "venue",
        "city"
      ];

      let csv = headers.join(",") + "\n";

      matches.forEach(m => {
        csv += headers.map(header => escapeCSV(m[header] || "")).join(",") + "\n";
      });

      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "matches.csv";
      a.click();

      URL.revokeObjectURL(url);
    }

    loadMatchesCSV();
  </script>
</body>
</html>
