<!DOCTYPE html>
<html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#071426"><title>Sonuç Yönetimi | 2026 Dünya Kupası</title><link rel="icon" href="logo.webp"><style>
:root{--bg:#071426;--panel:#0e223d;--soft:#091a30;--line:#2b4b72;--text:#f5f8ff;--muted:#9fb4d1;--blue:#55a6ff;--green:#41d68b;--gold:#f7c948}*{box-sizing:border-box}body{margin:0;min-width:320px;color:var(--text);background:radial-gradient(circle at 10% 0,rgba(67,215,210,.11),transparent 28rem),var(--bg);font-family:Inter,system-ui,"Segoe UI",sans-serif}button,input,select{font:inherit}button:focus-visible,input:focus-visible,select:focus-visible,a:focus-visible{outline:3px solid rgba(85,166,255,.5);outline-offset:2px}.page{width:min(1380px,100%);margin:auto;padding:24px}.topbar{display:flex;justify-content:space-between;align-items:center;gap:18px;margin-bottom:18px;padding:22px;background:linear-gradient(135deg,#102947,#15395e);border:1px solid var(--line);border-radius:22px}.brand{display:flex;align-items:center;gap:15px}.brand img{width:66px;height:66px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.13)}h1{margin:0;font-size:clamp(1.55rem,4vw,2.4rem)}p{margin:6px 0 0;color:var(--muted)}.back{flex:0 0 auto;padding:11px 15px;color:var(--text);background:#173b65;border:1px solid #3d6998;border-radius:11px;font-weight:750;text-decoration:none}.summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:18px}.summary-card{padding:16px;background:var(--panel);border:1px solid var(--line);border-radius:15px}.summary-label{color:var(--muted);font-size:.76rem}.summary-value{margin-top:5px;font-size:1.65rem;font-weight:850}.changed .summary-value{color:var(--gold)}.panel{padding:18px;background:linear-gradient(150deg,rgba(17,43,77,.98),rgba(10,28,51,.98));border:1px solid var(--line);border-radius:19px}.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}.search{flex:1 1 300px}.filter{flex:0 1 190px}.search input,.filter select{width:100%;min-height:44px;padding:10px 12px;color:var(--text);background:var(--soft);border:1px solid var(--line);border-radius:11px}.actions{display:flex;gap:9px;margin-left:auto}.button{min-height:44px;padding:10px 14px;border:1px solid transparent;border-radius:11px;cursor:pointer;font-weight:800}.save{color:#052619;background:var(--green)}.clear{color:#fff;background:#7a2634;border-color:#a43b4d}.status{margin:0 0 14px;padding:11px 13px;color:var(--muted);background:var(--soft);border:1px solid var(--line);border-radius:11px}.status.error{color:#ffd1d6;border-color:#984252;background:#3c1e28}.status.success{color:#caffdf;border-color:#277153;background:#103d2e}.table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:13px}table{width:100%;min-width:900px;border-collapse:collapse;background:rgba(7,20,38,.55)}th,td{padding:12px 10px;border-bottom:1px solid #203f63;text-align:left;vertical-align:middle}th{position:sticky;top:0;z-index:1;color:#b8d8ff;background:#102947;font-size:.75rem}tbody tr:hover{background:rgba(85,166,255,.07)}.match-id{color:var(--muted);font-size:.75rem}.match-date{color:var(--muted);font-size:.78rem}.team{min-width:155px;font-weight:750}.score{width:70px;min-height:42px;padding:7px;color:var(--text);background:#07182c;border:1px solid #3c638e;border-radius:9px;text-align:center;font-size:1rem;font-weight:850}.badge{display:inline-block;padding:5px 8px;border-radius:999px;font-size:.68rem;font-weight:850;white-space:nowrap}.played{color:#caffdf;background:#176044}.scheduled{color:#d7eaff;background:#254d79}.empty{padding:30px;color:var(--muted);text-align:center}.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}@media(max-width:760px){.page{padding:14px}.topbar{align-items:flex-start;flex-direction:column;padding:18px}.back{width:100%;text-align:center}.summary{grid-template-columns:repeat(2,1fr)}.panel{padding:13px}.search,.filter,.actions{width:100%;flex-basis:100%}.actions{margin-left:0}.actions .button{flex:1}.table-wrap{overflow:visible;border:0}table,tbody{display:block;min-width:0}thead{display:none}tbody{display:grid;gap:10px}tbody tr{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:13px;background:rgba(13,36,65,.84);border:1px solid var(--line);border-radius:13px}td{display:block;padding:0;border:0}td:before{content:attr(data-label);display:block;margin-bottom:4px;color:var(--muted);font-size:.65rem;font-weight:750}.status-cell{grid-column:1/-1}.score{width:100%}}
</style></head><body><main class="page"><header class="topbar"><div class="brand"><img src="logo.webp" alt=""><div><h1>Sonuç Yönetimi</h1><p>Skorları girin, CSV dosyasını indirin ve GitHub'daki mevcut dosyayla değiştirin.</p></div></div><a class="back" href="index.html">Panele dön</a></header><section class="summary" aria-label="Maç özeti"><article class="summary-card"><div class="summary-label">Toplam maç</div><div id="totalCount" class="summary-value">-</div></article><article class="summary-card"><div class="summary-label">Sonucu girilen</div><div id="playedCount" class="summary-value">-</div></article><article class="summary-card"><div class="summary-label">Bekleyen</div><div id="pendingCount" class="summary-value">-</div></article><article class="summary-card changed"><div class="summary-label">Değişiklik</div><div id="changedCount" class="summary-value">0</div></article></section><section class="panel"><div class="toolbar"><label class="search"><span class="sr-only">Takım veya maç ara</span><input id="searchInput" type="search" placeholder="Takım, maç ID veya tarih ara..." autocomplete="off"></label><label class="filter"><span class="sr-only">Sonuç durumu</span><select id="statusFilter"><option value="all">Tüm maçlar</option><option value="pending">Sonucu bekleyenler</option><option value="played">Sonucu girilenler</option></select></label><label class="filter"><span class="sr-only">Turnuva aşaması</span><select id="stageFilter"><option value="all">Tüm aşamalar</option><option value="Group">Grup aşaması</option><option value="knockout">Eleme aşaması</option></select></label><div class="actions"><button id="clearButton" class="button clear" type="button">Skorları temizle</button><button id="downloadButton" class="button save" type="button">CSV'yi indir</button></div></div><div id="status" class="status" role="status" aria-live="polite">Maçlar yükleniyor...</div><div class="table-wrap"><table><thead><tr><th>ID / Tarih</th><th>Aşama</th><th>Ev sahibi</th><th>Skor</th><th>Deplasman</th><th>Skor</th><th>Durum</th></tr></thead><tbody id="matchRows"></tbody></table></div></section></main><script>
const headers=["match_id","stage","group_name","match_date","match_time","home_team","away_team","home_score","away_score","status","venue","city"];let matches=[],changedRows=new Set(),searchTerm="",statusFilter="all",stageFilter="all";const $=id=>document.getElementById(id),esc=value=>String(value??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");function split(line){const cells=[];let cell="",quoted=false;for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'&&quoted&&line[i+1]==='"'){cell+='"';i++}else if(c==='"')quoted=!quoted;else if(c===","&&!quoted){cells.push(cell);cell=""}else cell+=c}cells.push(cell);return cells}function parseCsv(text){const lines=text.replace(/^\uFEFF/,"").trim().split(/\r?\n/).filter(Boolean),csvHeaders=split(lines[0]).map(v=>v.trim());return lines.slice(1).map(line=>{const values=split(line);return Object.fromEntries(csvHeaders.map((header,index)=>[header,(values[index]||"").trim()]))})}function hasScore(match){return String(match.home_score??"").trim()!==""&&String(match.away_score??"").trim()!==""}function syncStatus(match){match.status=hasScore(match)?"played":"scheduled"}function stageLabel(match){if(match.stage==="Group")return`Grup ${match.group_name||""}`;return{"Round of 32":"Son 32","Round of 16":"Son 16","Quarter-final":"Çeyrek final","Semi-final":"Yarı final","Third place":"Üçüncülük",Final:"Final"}[match.stage]||match.stage}function filtered(){return matches.filter(match=>{const played=hasScore(match);if(statusFilter==="played"&&!played||statusFilter==="pending"&&played||stageFilter==="Group"&&match.stage!=="Group"||stageFilter==="knockout"&&match.stage==="Group")return false;if(searchTerm){const text=[match.match_id,match.match_date,match.home_team,match.away_team,match.city,match.venue].join(" ").toLocaleLowerCase("tr-TR");if(!text.includes(searchTerm))return false}return true})}function updateSummary(){const played=matches.filter(hasScore).length;$("totalCount").textContent=matches.length;$("playedCount").textContent=played;$("pendingCount").textContent=matches.length-played;$("changedCount").textContent=changedRows.size}function render(){const visible=filtered();$("matchRows").innerHTML=visible.length?visible.map(match=>{const index=matches.indexOf(match),played=hasScore(match);return`<tr><td data-label="ID / Tarih"><div class="match-id">#${esc(match.match_id)}</div><div class="match-date">${esc(match.match_date)} • ${esc(match.match_time)}</div></td><td data-label="Aşama">${esc(stageLabel(match))}</td><td data-label="Ev sahibi" class="team">${esc(match.home_team)}</td><td data-label="Ev sahibi skoru"><input class="score" type="number" min="0" inputmode="numeric" aria-label="${esc(match.home_team)} skoru" data-index="${index}" data-field="home_score" value="${esc(match.home_score)}"></td><td data-label="Deplasman" class="team">${esc(match.away_team)}</td><td data-label="Deplasman skoru"><input class="score" type="number" min="0" inputmode="numeric" aria-label="${esc(match.away_team)} skoru" data-index="${index}" data-field="away_score" value="${esc(match.away_score)}"></td><td data-label="Durum" class="status-cell"><span class="badge ${played?"played":"scheduled"}">${played?"Sonuç girildi":"Bekliyor"}</span></td></tr>`}).join(""):'<tr><td class="empty" colspan="7">Bu filtrelere uygun maç bulunamadı.</td></tr>';updateSummary();$("status").className="status";$("status").textContent=`${visible.length} maç gösteriliyor.`}function updateScore(input){const index=Number(input.dataset.index),field=input.dataset.field,value=input.value===""?"":String(Math.max(0,Number(input.value)));input.value=value;matches[index][field]=value;syncStatus(matches[index]);changedRows.add(index);render()}function escapeCsv(value){const text=String(value??"");return/[",\n]/.test(text)?`"${text.replaceAll('"','""')}"`:text}function downloadCsv(){matches.forEach(syncStatus);const csv=[headers.join(","),...matches.map(match=>headers.map(header=>escapeCsv(match[header])).join(","))].join("\n")+"\n",blob=new Blob([csv],{type:"text/csv;charset=utf-8"}),url=URL.createObjectURL(blob),link=document.createElement("a");link.href=url;link.download="matches.csv";link.click();URL.revokeObjectURL(url);changedRows.clear();updateSummary();$("status").className="status success";$("status").textContent="Güncel matches.csv indirildi."}function clearScores(){if(!confirm("Tüm maç skorları silinecek. Bu işlemden sonra CSV'yi indirirseniz mevcut sonuçlar kaybolur. Devam edilsin mi?"))return;matches.forEach((match,index)=>{if(match.home_score||match.away_score)changedRows.add(index);match.home_score="";match.away_score="";syncStatus(match)});render();$("status").className="status success";$("status").textContent="Skorlar temizlendi. Değişikliğin uygulanması için CSV'yi indirin."}async function load(){try{const response=await fetch("matches.csv");if(!response.ok)throw new Error("matches.csv yüklenemedi");matches=parseCsv(await response.text());matches.forEach(syncStatus);render()}catch(error){console.error(error);$("status").className="status error";$("status").textContent=`Hata: ${error.message}`}}$("matchRows").addEventListener("change",event=>{if(event.target.matches(".score"))updateScore(event.target)});$("searchInput").addEventListener("input",event=>{searchTerm=event.target.value.trim().toLocaleLowerCase("tr-TR");render()});$("statusFilter").addEventListener("change",event=>{statusFilter=event.target.value;render()});$("stageFilter").addEventListener("change",event=>{stageFilter=event.target.value;render()});$("downloadButton").addEventListener("click",downloadCsv);$("clearButton").addEventListener("click",clearScores);addEventListener("beforeunload",event=>{if(!changedRows.size)return;event.preventDefault();event.returnValue=""});load();
</script></body></html>
